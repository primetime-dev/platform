[tools]
doctl = "1.154.0"
helm = "4.1.4"
kubectl = "1.34.1"
shellcheck = "0.11.0"
shfmt = "3.13.1"
terraform = "1.9.8"
terragrunt = "1.0.1"

[env]
'_'.file = { path = '.env', redact = true}

[tasks.fmt]
description = "Format shell scripts and Terraform files"
run = """
shfmt -i 2 -w bootstrap/*.sh
terraform fmt -recursive terraform
"""

[tasks.lint]
description = "Lint shell scripts and check Terraform formatting"
run = """
shellcheck bootstrap/*.sh
terraform fmt -check -recursive terraform
"""

[tasks.plan-testing]
description = "Plan the testing cluster with Terragrunt"
dir = "terragrunt/testing"
run = "terragrunt plan"

[tasks.apply-testing]
description = "Apply the testing cluster with Terragrunt"
dir = "terragrunt/testing"
run = "terragrunt apply"

[tasks.destroy-testing]
description = "Destroy the testing cluster with Terragrunt"
dir = "terragrunt/testing"
run = "terragrunt destroy -auto-approve"

[tasks.bootstrap]
description = "Apply shared namespaces and install Headlamp"
run = """
./bootstrap/apply-namespaces.sh
./bootstrap/install-headlamp.sh
"""

[tasks.headlamp-token]
description = "Create a Headlamp login token"
run = "kubectl -n headlamp create token admin-user"

[tasks.headlamp-port-forward]
description = "Port-forward the Headlamp service"
run = """
HEADLAMP_SERVICE_PORT="$(kubectl -n headlamp get svc headlamp -o jsonpath='{.spec.ports[0].port}')"
kubectl -n headlamp port-forward svc/headlamp "4466:${HEADLAMP_SERVICE_PORT}"
"""
